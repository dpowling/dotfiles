theme = "catppuccin_mocha"

[keys.normal]
C-l = "jump_view_right"
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
H = ":bp"
L = ":bn"

[keys.insert]
j = { j = "normal_mode"}

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "multiple"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

